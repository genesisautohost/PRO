<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>diag</title>
    <style>
      body { background: #0a0c10; color: #d7dce3; font: 16px/1.7 monospace; padding: 20px; }
      .ok { color: #6fb7c9; }
      .bad { color: #ff5d5d; }
      h1 { color: #ffb454; font-size: 20px; }
      pre { white-space: pre-wrap; word-break: break-word; color: #5f6b7a; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>diag · test page v9</h1>
    <div id="log">page HTML loaded ✓<br /></div>
    <pre id="ua"></pre>

    <script>
      // classic (non-module) script
      var log = document.getElementById('log');
      log.innerHTML += '<span class="ok">classic JS ran ✓</span><br>';
      document.getElementById('ua').textContent = 'UA: ' + navigator.userAgent + '\nmodules supported: ' +
        ('noModule' in HTMLScriptElement.prototype ? 'YES (browser claims module support)' : 'NO');
      log.innerHTML += 'time: ' + new Date().toString() + '<br>';
    </script>

    <script type="module">
      // module script — THIS is the kind the app uses
      const log = document.getElementById('log');
      log.innerHTML += '<span class="ok">MODULE JS ran ✓ — app type works!</span><br>';
    </script>

    <noscript><p class="bad">JavaScript is DISABLED in this browser.</p></noscript>
  </body>
</html>
